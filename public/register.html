<!DOCTYPE html>
<html>
<head>
    <title>Criar Conta</title>

    <style>

        @keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0B3D91;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* LOGO FUNDO */
.bg-logo{
    position:fixed;
    top:50%;
    left:50%;
    width:500px;
    height:500px;
    background:url("unnamed.png") no-repeat center;
    background-size:contain;
    transform:translate(-50%,-50%);
    opacity:0.08;
    z-index:0;
    pointer-events:none;
}

/* CARD */
.register-container{
    position:relative;
    z-index:1;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 6px 20px rgba(0,0,0,0.3);
    width:320px;
    text-align:center;
    animation: fadeInUp 0.6s ease-out;
}

/* INPUTS */
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

/* BOTÕES */
button{
    width:100%;
    padding:10px;
    background:#F9C80E;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    opacity:0.9;
}

/* BOTÃO SECUNDÁRIO */
.secondary-btn{
    background:#222;
    color:white;
}

/* MENSAGEM */
#msg{
    margin-top:10px;
    font-size:14px;
    color:red;
}

    </style>
</head>

<body>

<div class="bg-logo"></div>

<div class="register-container">

    <h2>Criar Conta</h2>

    <input type="text" id="username" placeholder="Utilizador">
    <input type="password" id="password" placeholder="Senha">

    <button onclick="register()">Criar Conta</button>

    <button class="secondary-btn" onclick="window.location.href='login.html'">
        Voltar ao login
    </button>

    <div id="msg"></div>

</div>

<script>

async function register() {

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    let res = await fetch("https://chatbotiisctem.onrender.com/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    let data = await res.json();

    if (data.success) {

        alert("Conta criada com sucesso!");
        window.location.href = "login.html";

    } else {
        document.getElementById("msg").innerText =
            data.message || "Erro ao criar conta";
    }
}

</script>

</body>
</html>
