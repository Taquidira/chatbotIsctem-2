<!DOCTYPE html>
<html>
<head>
    <title>Login Admin</title>

    <style>

        @keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0B3D91;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* LOGO FUNDO */
.bg-logo{
    position:fixed;
    top:50%;
    left:50%;
    width:500px;
    height:500px;
    background:url("unnamed.png") no-repeat center;
    background-size:contain;
    transform:translate(-50%,-50%);
    opacity:0.08;
    z-index:0;
    pointer-events:none;
}

/* LOGIN BOX */
.login-container{
    position:relative;
    z-index:1;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 6px 20px rgba(0,0,0,0.3);
    width:320px;
    text-align:center;
    animation: fadeInUp 0.6s ease-out;
}

/* INPUTS */
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

/* BOTAO PRINCIPAL */
button{
    width:100%;
    padding:10px;
    background:#F9C80E;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    opacity:0.9;
}

/* BOTAO SECONDARIO */
.secondary-btn{
    background:#222;
    color:white;
}

#error{
    color:red;
    margin-top:10px;
    font-size:14px;
}

    </style>
</head>

<body>

<div class="bg-logo"></div>

<div class="login-container">

    <h2>Login Admin</h2>

    <input type="text" id="username" placeholder="Utilizador">
    <input type="password" id="password" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <button class="secondary-btn" onclick="window.location.href='register.html'">
        Criar conta
    </button>

    <div id="error"></div>

</div>

<script>

async function login() {

    try {

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        let res = await fetch("https://chatbotIsctem-2.onrender.com/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        let data = await res.json();

        if (data.success) {
            localStorage.setItem("auth", "true");
            window.location.href = "dashboard.html";
        } else {
            document.getElementById("error").innerText = "Credenciais inválidas";
        }

    } catch (err) {
        console.log(err);
        document.getElementById("error").innerText = "Erro de ligação ao servidor";
    }
}

</script>

</body>
</html>
